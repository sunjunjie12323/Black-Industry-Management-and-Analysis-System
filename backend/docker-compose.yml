version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: threatintel
      POSTGRES_USER: threatintel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatintel_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatintel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://threatintel:${POSTGRES_PASSWORD:-threatintel_dev}@postgres:5432/threatintel
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      LLM_API_KEY: ${LLM_API_KEY:-}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD must be set}
      USE_ALEMBIC: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - appdata:/app/data
      - applogs:/app/logs

volumes:
  pgdata:
  redisdata:
  appdata:
  applogs:
