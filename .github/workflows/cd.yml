name: CD

on:
  release:
    types: [published]

jobs:
  build-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/threat-intel-agent:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}/threat-intel-agent:production

  security-scan:
    needs: build-production
    runs-on: ubuntu-latest

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/threat-intel-agent:production
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy-production:
    needs: [build-production, security-scan]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Version: ${{ github.event.release.tag_name }}"
          echo "Image: ghcr.io/${{ github.repository }}/threat-intel-agent:${{ github.event.release.tag_name }}"

      - name: Health check
        run: |
          echo "Running health check..."
          sleep 10
          curl -f http://localhost:8000/health || echo "Health check endpoint not available in CI"

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment ${{ job.status }}"
          echo "Release: ${{ github.event.release.tag_name }}"
