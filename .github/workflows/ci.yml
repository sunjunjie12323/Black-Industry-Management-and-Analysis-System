name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || true
          pip install ruff mypy pytest pytest-asyncio httpx || true

      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/ --output-format=github || true

      - name: Type check with mypy
        run: |
          cd backend
          mypy app/ --ignore-missing-imports --no-error-summary || true

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --asyncio-mode=auto || true

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/threat-intel-agent:latest
            ghcr.io/${{ github.repository }}/threat-intel-agent:${{ github.sha }}

  deploy-staging:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: threat-intel-agent:staging
          load: true

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: threat-intel-agent:staging"
